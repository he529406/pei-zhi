# 由可视化配置自动生成
# 代理模式: 智能分流
# 节点策略: 自动选择
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
find-process-mode: 'off'
# 性能优化
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
# 嗅探配置
sniffer:
  enable: false
  sniff:
    HTTP:
      ports: []
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.baidu.com"
# TUN 模式
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
# 配置持久化
profile:
  store-selected: true
  store-fake-ip: false
# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # 网络连接检测
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
    # 路由器管理页面
    - "instant.arubanetworks.com"
    - "setmeup.arubanetworks.com"
    - "asusrouter.com"
    - "router.asus.com"
    - "www.asusrouter.com"
    - "oasisauth.h3c.com"
    - "routerlogin.com"
    - "www.routerlogin.com"
    - "tplogin.cn"
    - "miwifi.com"
    - "www.miwifi.com"
    - "+.hiwifi.com"
    - "+.tplinkwifi.net"
    - "+.tendawifi.com"
    - "+.leike.cc"
    - "+.plex.direct"
    - "+.router.ctc"
    - "+.phicomm.me"
    - "+.peiluyou.com"
    - "+.zte.home"
    - "+.my.router"
    # 本地域名和保留域名
    - "+.internal"
    - "+.localdomain"
    - "+.example"
    - "+.invalid"
    - "+.localhost"
    - "+.test"
    - "+.local"
    - "+.lan"
    - "+.ts.net"
    - "+.home.arpa"
    # QQ 本地服务
    - "localhost.ptlogin2.qq.com"
    - "+.localhost.sec.qq.com"
    # Steam 测试域名
